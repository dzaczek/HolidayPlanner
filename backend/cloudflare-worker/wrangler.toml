name = "hcp-sync"
main = "worker.js"
compatibility_date = "2024-01-01"

# Calendar data namespace (E2EE blobs only)
# wrangler kv namespace create CALENDARS
[[kv_namespaces]]
binding = "CALENDARS"
id = "2ccb440b3fca44fcb40867bd187b59cb"

# Rate-limit counters — separate namespace so IP flooding never touches calendar data
# wrangler kv namespace create RATE_LIMITS  → paste generated ID below
[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "3b72d73ac7ad496d9f6f4435d9a3c36f"

# Secrets (set via: wrangler secret put SECRET_NAME)
# These are encrypted at rest in CF and injected as env vars at runtime.
# See .dev.vars.example for local dev equivalents.

[[routes]]
pattern = "hcp.sysop.cat/v1/*"
zone_name = "sysop.cat"
