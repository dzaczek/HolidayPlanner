services:
  hcp:
    build: .
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
      - /tmp
    volumes:
      - nginx-logs:/var/log/nginx
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped

  goaccess:
    build: ./goaccess
    ports:
      - "7890:7890"
      - "7891:7891"
    volumes:
      - nginx-logs:/var/log/nginx:ro
    depends_on:
      - hcp
    restart: unless-stopped

volumes:
  nginx-logs:
